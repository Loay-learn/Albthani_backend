server:
    port: ${PORT:-8080}

spring:
    application:
        name: currency
    servlet:
        multipart:
            max-file-size: 15MB
            max-request-size: 15MB

    datasource:
        url: ${SPRING_DATASOURCE_URL}
        username: ${SPRING_DATASOURCE_USERNAME}
        password: ${SPRING_DATASOURCE_PASSWORD}

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        properties:
            hibernate:
                format_sql: false

    mail:
        host: ${MAIL_HOST}
        port: ${MAIL_PORT}
        username: ${MAIL_USERNAME}
        password: ${MAIL_PASSWORD}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
                        required: true

    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        scope: email,profile
                        redirect-uri: "{baseUrl}/login/oauth2/code/google"

jwt:
    secret: ${JWT_SECRET}
    access-token:
        expiration: 86400000
    refresh-token:
        expiration: 31536000000

telegram:
    bot:
        token: ${TELEGRAM_BOT_TOKEN}
    chat:
        id: ${TELEGRAM_CHAT_ID}

admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}

app:
    cors:
        allowed-origin: ${CORS_ALLOWED_ORIGIN}

springdoc:
    api-docs:
        enabled: ${SWAGGER_ENABLED:false}
    swagger-ui:
        path: /swagger-ui.html

cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

frontend:
    url: ${FRONTEND_URL}